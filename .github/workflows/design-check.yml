name: Design check

on:
  pull_request:
    paths:
      - DESIGN.md
      - app/globals.css
      - app/**/*.tsx
      - scripts/check-design-drift.mjs
      - .github/workflows/design-check.yml
  push:
    branches: [main]
    paths:
      - DESIGN.md
      - app/globals.css
      - app/**/*.tsx
      - scripts/check-design-drift.mjs

jobs:
  design-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Drift check (DESIGN.md ↔ globals.css)
        run: npm run design:drift
      - name: Google design.md linter
        run: npm run design:lint
        continue-on-error: true
